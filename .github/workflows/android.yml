name: build-apk
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 20}
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: 21}
      - run: npm install
      - run: mkdir -p dist && cp -r *.html *.js *.css assets dist/ 2>/dev/null || true
      - run: mkdir -p dist && cp -r *.html *.js *.css assets dist/ 2>/dev/null || true
      - run: npm install -g @capacitor/cli
      - run: mkdir -p dist && cp -r *.html *.js *.css assets dist/ 2>/dev/null || true
      - run: mkdir -p dist && cp -r *.html *.js *.css assets dist/ 2>/dev/null || true
      - run: npm install @capacitor/core @capacitor/android
      - run: mkdir -p dist && cp -r *.html *.js *.css assets dist/ 2>/dev/null || true
      - run: mkdir -p dist && cp -r *.html *.js *.css assets dist/ 2>/dev/null || true
      - run: npx cap init LMWSA com.lmwsa.app --web-dir dist
      - run: npx cap add android
      - run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with: {name: apk, path: android/app/build/outputs/apk/debug/app-debug.apk}
